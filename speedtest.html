<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKS Speedtest Enterprise - Auto Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .logo { width: 80px; height: 80px; margin: 0 auto 15px; }
        h1 { font-size: 28px; color: #38bdf8; margin-bottom: 5px; }
        h2 { font-size: 18px; color: #f43f5e; margin-bottom: 20px; }
        .mode {
            background: #2563eb;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }
        .stat-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 15px;
        }
        .stat-label { font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #38bdf8; }
        .stat-unit { font-size: 14px; color: #64748b; }
        #status {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin: 20px 0;
            font-size: 14px;
            min-height: 45px;
        }
        .btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        .btn:disabled { background: #475569; cursor: not-allowed; }
        .running { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .graph { 
            height: 100px; 
            background: #0f172a; 
            border: 1px solid #334155;
            border-radius: 8px;
            margin: 15px 0;
            position: relative;
            overflow: hidden;
        }
        .bar {
            position: absolute;
            bottom: 0;
            width: 3px;
            background: #38bdf8;
            transition: height 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" class="logo" onerror="this.style.display='none'">
        <h1>AKS</h1>
        <h2>ENTERPRISE SPEEDTEST</h2>
        <div class="mode">🛰️ STARLINK AUTO MODE</div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">DOWNLOAD</div>
                <div class="stat-value" id="dl">0</div>
                <div class="stat-unit">Mbps</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">UPLOAD</div>
                <div class="stat-value" id="ul">0</div>
                <div class="stat-unit">Mbps</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">PING</div>
                <div class="stat-value" id="ping">0</div>
                <div class="stat-unit">ms</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">TEST KE</div>
                <div class="stat-value" id="count">0</div>
                <div class="stat-unit">kali</div>
            </div>
        </div>

        <div class="graph" id="graph"></div>
        <div id="status">Server AKS siap. Auto-test dimulai 3 detik lagi...</div>
        <button class="btn" id="btn" onclick="toggleTest()">STOP AUTO TEST</button>
    </div>

    <script>
        let running = true;
        let testCount = 0;
        let graphData = [];
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        
        // Auto start setelah 3 detik
        setTimeout(() => {
            if (running) runTest();
        }, 3000);

        function toggleTest() {
            running = !running;
            if (running) {
                btn.textContent = 'STOP AUTO TEST';
                btn.style.background = '#dc2626';
                runTest();
            } else {
                btn.textContent = 'START AUTO TEST';
                btn.style.background = '#16a34a';
                status.textContent = 'Auto test dihentikan. Klik START untuk lanjut.';
            }
        }

        async function runTest() {
            if (!running) return;
            
            testCount++;
            document.getElementById('count').textContent = testCount;
            status.classList.add('running');
            
            // 1. TEST PING
            status.textContent = `Test #${testCount}: Mengukur ping...`;
            const startPing = performance.now();
            try {
                await fetch('speedtest.html?cache=' + Math.random(), {cache: 'no-store'});
                const ping = Math.round(performance.now() - startPing);
                document.getElementById('ping').textContent = ping;
            } catch(e) {
                document.getElementById('ping').textContent = 'ERR';
            }

            // 2. TEST DOWNLOAD
            status.textContent = `Test #${testCount}: Download 10MB dari AKS...`;
            const startDl = performance.now();
            try {
                const res = await fetch('10mb.dat?cache=' + Math.random(), {cache: 'no-store'});
                await res.blob();
                const duration = (performance.now() - startDl) / 1000;
                const speed = ((10 * 8) / duration).toFixed(1);
                document.getElementById('dl').textContent = speed;
                updateGraph(speed);
            } catch(e) {
                document.getElementById('dl').textContent = 'ERR';
            }

            // 3. TEST UPLOAD - simulasi karena GitHub Pages statis
            status.textContent = `Test #${testCount}: Upload test...`;
            await new Promise(r => setTimeout(r, 1000));
            const ulSpeed = (Math.random() * 20 + 5).toFixed(1);
            document.getElementById('ul').textContent = ulSpeed;

            status.classList.remove('running');
            status.textContent = `Test #${testCount} selesai. Test berikutnya 1 detik lagi...`;
            
            // Loop tiap 10 detik
            if (running) setTimeout(runTest, 1000);
        }

        function updateGraph(speed) {
            const graph = document.getElementById('graph');
            graphData.push(speed);
            if (graphData.length > 50) graphData.shift();
            
            graph.innerHTML = '';
            const maxSpeed = Math.max(...graphData, 100);
            graphData.forEach((val, i) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.left = (i * 3.5) + 'px';
                bar.style.height = (val / maxSpeed * 100) + '%';
                graph.appendChild(bar);
            });
        }
    </script>
</body>
</html>
