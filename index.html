<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKS Speedtest Pro Max - Deteksi Sinyal & IP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;600;700&display=swap');
        :root {
            --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0;
            --text2: #94a3b8; --accent: #ef4444; --glow: rgba(239, 68, 68, 0.4); --green: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif;
            display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;
        }
       .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 24px;
            padding: 30px; max-width: 650px; width: 100%; text-align: center;
            box-shadow: 0 0 60px var(--glow);
        }
       .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
       .logo-wrap { display: flex; align-items: center; gap: 10px; }
       .logo-aks { width: 50px; border-radius: 50%; border: 2px solid var(--accent); }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 24px; }
        h1 span { color: var(--accent); }
       .chart-container { position: relative; height: 200px; margin: 15px auto; }
        #status { color: #fbbf24; margin: 15px 0; font-weight: 600; min-height: 24px; font-family: 'Orbitron'; }
       .hasil { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
       .box { background: var(--bg); padding: 15px 5px; border-radius: 12px; border: 1px solid var(--border); }
       .box h3 { color: var(--text2); font-size: 10px; margin-bottom: 8px; text-transform: uppercase; }
       .angka { font-family: 'Orbitron', sans-serif; font-size: 20px; color: var(--text); }
       .satuan { font-size: 10px; color: var(--text2); }
       .network-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
       .network-box { background: var(--bg); padding: 12px; border-radius: 12px; border: 1px solid var(--border); text-align: left; }
       .network-box h4 { font-size: 10px; color: var(--text2); margin-bottom: 5px; }
       .network-box p { font-size: 13px; font-weight: 600; color: var(--text); }
       .network-box.signal { color: var(--green); }
       .btn-group { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
       .btn-test {
            background: linear-gradient(45deg, #dc2626, var(--accent)); color: white;
            padding: 16px; border-radius: 15px; border: none; font-weight: 700;
            font-size: 16px; cursor: pointer; box-shadow: 0 0 25px var(--glow);
        }
       .btn-share { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
       .btn-test:disabled { background: #475569; box-shadow: none; }
        @media (max-width: 600px) {.hasil { grid-template-columns: 1fr 1fr; }.network-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo-wrap">
                <img src="./logo.png" alt="AKS" class="logo-aks">
                <h1>AKS <span>NET DETECTOR</span></h1>
            </div>
        </div>

        <div class="chart-container"><canvas id="speedChart"></canvas></div>
        <div id="status">Siap ngetes jaringan + sinyal lu bos 🔥</div>

        <div class="hasil">
            <div class="box"><h3><i class="fa-solid fa-download"></i> Download</h3><div class="angka" id="download">-</div><div class="satuan">Mbps</div></div>
            <div class="box"><h3><i class="fa-solid fa-upload"></i> Upload</h3><div class="angka" id="upload">-</div><div class="satuan">Mbps</div></div>
            <div class="box"><h3><i class="fa-solid fa-signal"></i> Ping</h3><div class="angka" id="ping">-</div><div class="satuan">ms</div></div>
            <div class="box"><h3><i class="fa-solid fa-wave-square"></i> Jitter</h3><div class="angka" id="jitter">-</div><div class="satuan">ms</div></div>
        </div>

        <div class="network-grid">
            <div class="network-box"><h4><i class="fa-solid fa-globe"></i> IP PUBLIK</h4><p id="ipPublic">...</p></div>
            <div class="network-box"><h4><i class="fa-solid fa-house-signal"></i> IP LOKAL</h4><p id="ipLocal">...</p></div>
            <div class="network-box"><h4><i class="fa-solid fa-tower-cell"></i> JENIS JARINGAN</h4><p id="netType" class="signal">...</p></div>
            <div class="network-box"><h4><i class="fa-solid fa-gauge-high"></i> KUALITAS SINYAL</h4><p id="netEffective" class="signal">...</p></div>
            <div class="network-box"><h4><i class="fa-solid fa-wifi"></i> ISP / PROVIDER</h4><p id="isp">...</p></div>
            <div class="network-box"><h4><i class="fa-solid fa-location-dot"></i> LOKASI</h4><p id="lokasi">...</p></div>
        </div>

        <div class="btn-group">
            <button class="btn-test" id="startBtn"><i class="fa-solid fa-bolt"></i> TEST SEMUA</button>
            <button class="btn-test btn-share" id="shareBtn" disabled><i class="fa-brands fa-whatsapp"></i> SHARE</button>
        </div>
    </div>

<script>
const el = id => document.getElementById(id);
const statusText = el('status'), startBtn = el('startBtn'), shareBtn = el('shareBtn');
let chart, testData = {};

// Chart Setup
const ctx = el('speedChart').getContext('2d');
chart = new Chart(ctx, {
    type: 'doughnut',
    data: { datasets: [{ data: [0, 100], backgroundColor: ['#ef4444', '#334155'], borderWidth: 0 }] },
    options: { cutout: '80%', rotation: -90, circumference: 180, plugins: { legend: { display: false }, tooltip: { enabled: false } } }
});
function updateChart(speed, max = 100) {
    const percent = Math.min((speed / max) * 100, 100);
    chart.data.datasets[0].data = [percent, 100 - percent];
    chart.update('none');
    statusText.innerHTML = `${speed.toFixed(2)} Mbps`;
}

// 1. DETEKSI INFO JARINGAN & SINYAL
function detectNetwork() {
    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (conn) {
        el('netType').textContent = conn.type? conn.type.toUpperCase() : 'Unknown';
        el('netEffective').textContent = `${conn.effectiveType.toUpperCase()} | ${conn.downlink} Mbps`;
        testData.netType = conn.type;
        testData.netEffective = conn.effectiveType;
        testData.downlink = conn.downlink;
    } else {
        el('netType').textContent = 'Tidak Support';
        el('netEffective').textContent = 'Browser Lama';
    }
}

// 2. DETEKSI IP LOKAL VIA WebRTC
function getLocalIP() {
    return new Promise((resolve) => {
        const pc = new RTCPeerConnection({iceServers:[]});
        pc.createDataChannel('');
        pc.createOffer().then(offer => pc.setLocalDescription(offer));
        pc.onicecandidate = (ice) => {
            if (!ice ||!ice.candidate ||!ice.candidate.candidate) return;
            const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(ice.candidate.candidate)[1];
            el('ipLocal').textContent = ip;
            testData.ipLocal = ip;
            pc.onicecandidate = () => {};
            resolve(ip);
        };
        setTimeout(() => resolve('Gagal'), 1000);
    });
}

// 3. DETEKSI IP PUBLIK + ISP + LOKASI
fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
    el('ipPublic').textContent = data.ip;
    el('isp').textContent = data.org;
    el('lokasi').textContent = `${data.city}, ${data.country_code}`;
    testData.ipPublic = data.ip; testData.isp = data.org; testData.lokasi = data.city;
});

// Jalanin deteksi pas load
detectNetwork(); getLocalIP();

// 4. SPEEDTEST FUNCTION
async function runSpeedTest() {
    startBtn.disabled = true; shareBtn.disabled = true;
    try {
        // Ping
        statusText.textContent = 'Test Ping...';
        let pings = [];
        for (let i = 0; i < 5; i++) {
            let start = performance.now();
            await fetch('https://www.cloudflare.com/cdn-cgi/trace', { cache: 'no-store' });
            pings.push(performance.now() - start);
        }
        testData.ping = (pings.reduce((a, b) => a + b) / pings.length).toFixed(0);
        let avg = pings.reduce((a, b) => a + b) / pings.length;
        testData.jitter = Math.sqrt(pings.map(x => Math.pow(x - avg, 2)).reduce((a, b) => a + b) / pings.length).toFixed(0);
        el('ping').textContent = testData.ping; el('jitter').textContent = testData.jitter;

        // Download
        statusText.textContent = 'Test Download...';
        const startTime = performance.now();
        const res = await fetch('https://speed.cloudflare.com/__down?bytes=50000000', { cache: 'no-store' });
        const reader = res.body.getReader();
        let received = 0;
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            received += value.length;
            testData.download = ((received * 8) / ((performance.now() - startTime) / 1000) / 1024).toFixed(2);
            updateChart(testData.download); el('download').textContent = testData.download;
        }

        // Upload
        statusText.textContent = 'Test Upload...';
        const data = new Blob([new ArrayBuffer(20 * 1024)]);
        const startUp = performance.now();
        await fetch('https://speed.cloudflare.com/__up', { method: 'POST', body: data });
        testData.upload = ((data.size * 8) / ((performance.now() - startUp) / 1000) / 1024).toFixed(2);
        el('upload').textContent = testData.upload; updateChart(testData.upload);

        statusText.textContent = 'Selesai! Semua data ketangkep 🔥';
        shareBtn.disabled = false;
    } catch (e) {
        statusText.textContent = 'Gagal test. Cek koneksi';
    }
    startBtn.disabled = false;
}

startBtn.onclick = runSpeedTest;

// 5. SHARE KE WA
shareBtn.onclick = () => {
    const text = `📡 Hasil Net Detector AKS:\n\n📥 Download: ${testData.download} Mbps\n📤 Upload: ${testData.upload} Mbps\n📶 Ping: ${testData.ping}ms | Jitter: ${testData.jitter}ms\n\n🌐 IP Publik: ${testData.ipPublic}\n🏠 IP Lokal: ${testData.ipLocal}\n📡 Jaringan: ${testData.netType} | ${testData.netEffective}\n🏢 ISP: ${testData.isp}\n📍 ${testData.lokasi}\n\nTest juga: ${window.location.href}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
};
</script>
</body>
</html>
