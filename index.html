<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKS Speedtest Pro - Cek 6G WiFi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at top, #1e1b4b, #0f172a); 
            color: #e2e8f0; font-family: 'Poppins', sans-serif;
            display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(15px);
            border: 1px solid #334155; border-radius: 24px;
            padding: 40px 30px; max-width: 500px; width: 100%; text-align: center;
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.25);
        }
        .logo-aks { width: 70px; margin-bottom: 15px; border-radius: 50%; border: 2px solid #ef4444; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 32px; margin-bottom: 8px; }
        h1 span { color: #ef4444; text-shadow: 0 0 15px #ef4444; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 14px; }
        .meter {
            width: 220px; height: 220px; margin: 0 auto 30px; position: relative;
            background: conic-gradient(#334155 0deg, #334155 360deg);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .meter-inner {
            width: 180px; height: 180px; background: #0f172a; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        #speed-value { font-family: 'Orbitron', sans-serif; font-size: 48px; color: #fff; line-height: 1; }
        #speed-label { font-size: 14px; color: #ef4444; font-weight: 700; }
        .hasil { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 30px 0; }
        .box { background: #0f172a; padding: 15px 10px; border-radius: 12px; border: 1px solid #334155; }
        .box h3 { color: #64748b; font-size: 10px; margin-bottom: 8px; }
        .box h3 i { margin-right: 4px; }
        .angka { font-family: 'Orbitron', sans-serif; font-size: 20px; color: #e2e8f0; }
        .satuan { font-size: 10px; color: #64748b; }
        #status { color: #fbbf24; margin: 20px 0; font-weight: 600; min-height: 24px; }
        .btn-test {
            background: linear-gradient(45deg, #dc2626, #ef4444); color: white;
            padding: 18px 40px; border-radius: 30px; border: none; font-weight: 700;
            font-size: 18px; cursor: pointer; transition: 0.3s; width: 100%;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
        }
        .btn-test:hover { transform: scale(1.03); box-shadow: 0 0 40px rgba(239, 68, 68, 0.7); }
        .btn-test:disabled { background: #475569; box-shadow: none; cursor: not-allowed; }
        .info-ip { margin-top: 25px; font-size: 12px; color: #64748b; display: flex; justify-content: space-around; }
        .back { display: inline-block; margin-top: 30px; color: #94a3b8; text-decoration: none; font-size: 14px; }
        .back:hover { color: #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <img src="LINK_LOGO_AKS_LU" alt="AKS" class="logo-aks">
        <h1>AKS <span>SPEEDTEST PRO</span></h1>
        <p>Test kecepatan WiFi lu sampe ke akar-akar bos 🔥</p>

        <div class="meter" id="meter">
            <div class="meter-inner">
                <div id="speed-value">0</div>
                <div id="speed-label">Mbps</div>
            </div>
        </div>

        <div class="hasil">
            <div class="box">
                <h3><i class="fa-solid fa-download"></i> DOWNLOAD</h3>
                <div class="angka" id="download">-</div>
                <div class="satuan">Mbps</div>
            </div>
            <div class="box">
                <h3><i class="fa-solid fa-upload"></i> UPLOAD</h3>
                <div class="angka" id="upload">-</div>
                <div class="satuan">Mbps</div>
            </div>
            <div class="box">
                <h3><i class="fa-solid fa-signal"></i> PING</h3>
                <div class="angka" id="ping">-</div>
                <div class="satuan">ms</div>
            </div>
            <div class="box">
                <h3><i class="fa-solid fa-wave-square"></i> JITTER</h3>
                <div class="angka" id="jitter">-</div>
                <div class="satuan">ms</div>
            </div>
        </div>

        <div id="status">Pencet tombol buat mulai test</div>
        <button class="btn-test" id="startBtn"><i class="fa-solid fa-bolt"></i> MULAI TEST</button>
        
        <div class="info-ip">
            <span>IP: <b id="ip">...</b></span>
            <span>ISP: <b id="isp">...</b></span>
        </div>
        <a href="index.html" class="back"><i class="fa-solid fa-arrow-left"></i> Balik ke Web AKS</a>
    </div>

<script>
const statusText = document.getElementById('status');
const downloadEl = document.getElementById('download');
const uploadEl = document.getElementById('upload');
const pingEl = document.getElementById('ping');
const jitterEl = document.getElementById('jitter');
const speedValueEl = document.getElementById('speed-value');
const startBtn = document.getElementById('startBtn');
const ipEl = document.getElementById('ip');
const ispEl = document.getElementById('isp');
const meterEl = document.getElementById('meter');

// Ambil IP + ISP
fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(data => {
        ipEl.textContent = data.ip;
        ispEl.textContent = data.org || 'Unknown';
    }).catch(() => {
        ipEl.textContent = 'Gagal';
        ispEl.textContent = 'Gagal';
    });

function updateMeter(speed, maxSpeed = 100) {
    speedValueEl.textContent = speed;
    let percent = Math.min((speed / maxSpeed) * 100, 100);
    let degree = percent * 3.6;
    meterEl.style.background = `conic-gradient(#ef4444 ${degree}deg, #334155 ${degree}deg)`;
}

async function testPing() {
    statusText.textContent = 'Ngetes Ping... 📡';
    let pings = [];
    for (let i = 0; i < 5; i++) {
        let start = performance.now();
        await fetch('https://www.cloudflare.com/cdn-cgi/trace', { cache: 'no-store' });
        let end = performance.now();
        pings.push(end - start);
        pingEl.textContent = (pings.reduce((a, b) => a + b) / pings.length).toFixed(0);
    }
    let avg = pings.reduce((a, b) => a + b) / pings.length;
    let jitter = Math.sqrt(pings.map(x => Math.pow(x - avg, 2)).reduce((a, b) => a + b) / pings.length);
    jitterEl.textContent = jitter.toFixed(0);
    return avg;
}

async function testDownload() {
    statusText.textContent = 'Ngetes Download... 📥';
    const url = 'https://speed.cloudflare.com/__down?bytes=25000000'; // 25MB
    const startTime = performance.now();
    const response = await fetch(url, { cache: 'no-store' });
    const reader = response.body.getReader();
    let receivedLength = 0;
    while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        receivedLength += value.length;
        const duration = (performance.now() - startTime) / 1000;
        const speed = ((receivedLength * 8) / duration / 1024).toFixed(2);
        updateMeter(speed);
        downloadEl.textContent = speed;
    }
}

async function testUpload() {
    statusText.textContent = 'Ngetes Upload... 📤';
    const data = new Blob([new ArrayBuffer(10 * 1024)]); // 10MB
    const startTime = performance.now();
    await fetch('https://speed.cloudflare.com/__up', { method: 'POST', body: data });
    const duration = (performance.now() - startTime) / 1000;
    const speed = ((data.size * 8) / duration / 1024 / 1024).toFixed(2);
    uploadEl.textContent = speed;
    updateMeter(speed);
}

startBtn.onclick = async () => {
    startBtn.disabled = true;
    downloadEl.textContent = '-'; uploadEl.textContent = '-';
    pingEl.textContent = '-'; jitterEl.textContent = '-';
    updateMeter(0);
    
    try {
        await testPing();
        await testDownload();
        await testUpload();
        statusText.textContent = 'Test Selesai! GG lu bos ✅';
    } catch (e) {
        statusText.textContent = 'Test gagal 😅 Cek koneksi lu';
    }
    startBtn.disabled = false;
};
</script>
</body>
</html>
