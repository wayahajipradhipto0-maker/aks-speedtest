<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKS Network Monitor - Sungai Bakau</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0f1c;
            color: #e2e8f0;
            padding: 20px;
        }
        .header {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .header h1 { color: #38bdf8; font-size: 24px; }
        .header h1 span { color: #f43f5e; }
        .status-live {
            background: #16a34a;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
        }
        .card h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        .big-num {
            font-size: 32px;
            font-weight: bold;
            color: #38bdf8;
        }
        .big-num span { font-size: 16px; color: #64748b; }
        .device-table {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .device-table h3 {
            padding: 20px;
            border-bottom: 1px solid #334155;
            color: #38bdf8;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th { color: #94a3b8; font-size: 12px; }
        .online { color: #16a34a; font-weight: bold; }
        .offline { color: #dc2626; font-weight: bold; }
        .nav-links {
            margin-bottom: 20px;
        }
        .nav-links a {
            color: #38bdf8;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }
        .map-frame {
            width: 100%;
            height: 300px;
            border: 0;
            border-radius: 12px;
            background: #1e293b;
        }
        .btn-lokasi {
            background: #2563eb;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="nav-links">
        <a href="index.html">← Home AKS</a>
        <a href="speedtest.html">Speedtest</a>
        <a href="network.html">Network Monitor</a>
    </div>

    <div class="header">
        <h1>AKS <span>NETWORK MONITOR</span></h1>
        <div class="status-live">● LIVE</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>TOTAL BANDWIDTH</h3>
            <div class="big-num" id="bw">722<span>Mbps</span></div>
        </div>
        <div class="card">
            <h3>CLIENT ONLINE</h3>
            <div class="big-num" id="clients">8<span>/25</span></div>
        </div>
        <div class="card">
            <h3>LOKASI SERVER AKS</h3>
            <div class="big-num" id="lokasi">Sambas</div>
            <button class="btn-lokasi" onclick="getLocation()">Dapatkan GPS Akurat</button>
        </div>
        <div class="card">
            <h3>WIFI TERKONEK</h3>
            <div class="big-num" id="wifi">AKS-STARLINK</div>
            <small style="color:#64748b">*Nama WiFi HP yang buka web ini</small>
        </div>
    </div>

    <div class="device-table">
        <h3>DAFTAR CLIENT AKS - SUNGAI BAKAU</h3>
        <table>
            <thead>
                <tr>
                    <th>NAMA</th>
                    <th>IP</th>
                    <th>STATUS</th>
                    <th>SINYAL</th>
                    <th>JARAK</th>
                </tr>
            </thead>
            <tbody id="deviceList"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>PETA LOKASI SERVER AKS + CLIENT</h3>
        <iframe id="map" class="map-frame" src="https://maps.google.com/maps?q=1.3621,109.3172&z=15&output=embed"></iframe>
    </div>

    <script>
        const devices = [
            {name: "Warung Pak RT", ip: "192.168.1.10", lat: 1.3625, lon: 109.3180, signal: -45},
            {name: "Warkop AKS", ip: "192.168.1.11", lat: 1.3618, lon: 109.3165, signal: -55},
            {name: "Rumah Bu Lurah", ip: "192.168.1.12", lat: 1.3630, lon: 109.3175, signal: -65},
            {name: "Sekolah SD 01", ip: "192.168.1.13", lat: 1.3610, lon: 109.3185, signal: -70},
        ];

        // 1. DETEKSI LOKASI GPS
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            } else {
                alert("Browser lu gak support GPS");
            }
        }

        function showPosition(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            document.getElementById('lokasi').innerHTML = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
            document.getElementById('map').src = `https://maps.google.com/maps?q=${lat},${lon}&z=17&output=embed`;
        }

        function showError(error) {
            alert("Gagal ambil GPS. Kasih izin lokasi di browser dulu bos.");
        }

        // 2. UPDATE DATA CLIENT + JARAK
        function updateData() {
            const tbody = document.getElementById('deviceList');
            tbody.innerHTML = '';
            devices.forEach(d => {
                const status = Math.random() > 0.2 ? 1 : 0;
                const jarak = Math.floor(Math.random() * 200 + 50); // meter
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${d.name}</td>
                    <td>${d.ip}</td>
                    <td class="${status ? 'online' : 'offline'}">${status ? '● ONLINE' : '● OFFLINE'}</td>
                    <td>${d.signal} dBm</td>
                    <td>~${jarak}m</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 3. DETEKSI INFO KONEKSI - cuma bisa dapet tipe jaringan
        if(navigator.connection) {
            const type = navigator.connection.effectiveType;
            document.getElementById('wifi').innerHTML = `Koneksi: ${type.toUpperCase()}`;
        }

        setInterval(updateData, 2000);
        updateData();
    </script>
</body>
</html>
