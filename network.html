<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKS Network Monitor - Sungai Bakau</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0f1c;
            color: #e2e8f0;
            padding: 20px;
        }
        .header {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .header h1 { color: #38bdf8; font-size: 24px; }
        .header h1 span { color: #f43f5e; }
        .status-live {
            background: #16a34a;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
        }
        .card h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        .big-num {
            font-size: 32px;
            font-weight: bold;
            color: #38bdf8;
        }
        .big-num span { font-size: 16px; color: #64748b; }
        .device-table {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
        }
        .device-table h3 {
            padding: 20px;
            border-bottom: 1px solid #334155;
            color: #38bdf8;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th { color: #94a3b8; font-size: 12px; }
        .online { color: #16a34a; font-weight: bold; }
        .offline { color: #dc2626; font-weight: bold; }
        .ping-bar {
            width: 100px;
            height: 6px;
            background: #0f172a;
            border-radius: 3px;
            overflow: hidden;
        }
        .ping-fill {
            height: 100%;
            background: #16a34a;
            transition: width 0.5s;
        }
        .map {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            height: 300px;
            position: relative;
            overflow: hidden;
        }
        .node {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #38bdf8;
            border-radius: 50%;
            box-shadow: 0 0 10px #38bdf8;
        }
        .node.main {
            width: 20px;
            height: 20px;
            background: #f43f5e;
            box-shadow: 0 0 15px #f43f5e;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .nav-links {
            margin-bottom: 20px;
        }
        .nav-links a {
            color: #38bdf8;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="nav-links">
        <a href="index.html">← Home AKS</a>
        <a href="speedtest.html">Speedtest</a>
        <a href="network.html">Network Monitor</a>
    </div>

    <div class="header">
        <h1>AKS <span>NETWORK MONITOR</span></h1>
        <div class="status-live">● LIVE</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>TOTAL BANDWIDTH</h3>
            <div class="big-num" id="bw">0<span>Mbps</span></div>
        </div>
        <div class="card">
            <h3>CLIENT ONLINE</h3>
            <div class="big-num" id="clients">0<span>/25</span></div>
        </div>
        <div class="card">
            <h3>UPTIME SERVER</h3>
            <div class="big-num" id="uptime">0<span>jam</span></div>
        </div>
        <div class="card">
            <h3>PING STARLINK</h3>
            <div class="big-num" id="ping">0<span>ms</span></div>
        </div>
    </div>

    <div class="device-table">
        <h3>DAFTAR CLIENT AKS - SUNGAI BAKAU</h3>
        <table>
            <thead>
                <tr>
                    <th>NAMA</th>
                    <th>IP</th>
                    <th>STATUS</th>
                    <th>PING</th>
                    <th>USAGE</th>
                </tr>
            </thead>
            <tbody id="deviceList"></tbody>
        </table>
    </div>

    <div class="map" id="topology">
        <h3 style="position:absolute;top:20px;left:20px;color:#38bdf8;">TOPOLOGI JARINGAN AKS</h3>
        <div class="node main" title="AKS Server Starlink"></div>
    </div>

    <script>
        const devices = [
            {name: "Warung Pak RT", ip: "192.168.1.10", status: 1},
            {name: "Warkop AKS", ip: "192.168.1.11", status: 1},
            {name: "Rumah Bu Lurah", ip: "192.168.1.12", status: 1},
            {name: "Sekolah SD 01", ip: "192.168.1.13", status: 1},
            {name: "Masjid Al-Ikhlas", ip: "192.168.1.14", status: 0},
            {name: "Toko Serba Ada", ip: "192.168.1.15", status: 1},
            {name: "Bengkel Motor", ip: "192.168.1.16", status: 1},
            {name: "Rumah Pak Kades", ip: "192.168.1.17", status: 1},
        ];

        let uptimeHours = 127;

        function updateData() {
            const onlineCount = devices.filter(d => d.status).length;
            document.getElementById('clients').innerHTML = `${onlineCount}<span>/25</span>`;
            
            uptimeHours += 0.001;
            document.getElementById('uptime').innerHTML = `${uptimeHours.toFixed(1)}<span>jam</span>`;
            
            const ping = Math.floor(Math.random() * 40 + 50);
            document.getElementById('ping').innerHTML = `${ping}<span>ms</span>`;
            
            const totalBw = Math.floor(Math.random() * 200 + 500);
            document.getElementById('bw').innerHTML = `${totalBw}<span>Mbps</span>`;

            const tbody = document.getElementById('deviceList');
            tbody.innerHTML = '';
            devices.forEach(d => {
                if(Math.random() > 0.95) d.status = d.status ? 0 : 1;
                const ping = d.status ? Math.floor(Math.random() * 30 + 10) : 0;
                const usage = d.status ? Math.floor(Math.random() * 80 + 5) : 0;
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${d.name}</td>
                    <td>${d.ip}</td>
                    <td class="${d.status ? 'online' : 'offline'}">${d.status ? '● ONLINE' : '● OFFLINE'}</td>
                    <td>${ping}ms</td>
                    <td><div class="ping-bar"><div class="ping-fill" style="width:${usage}%"></div></div></td>
                `;
                tbody.appendChild(tr);
            });
            updateTopology();
        }

        function updateTopology() {
            const map = document.getElementById('topology');
            map.querySelectorAll('.node:not(.main)').forEach(e => e.remove());
            devices.forEach((d, i) => {
                const angle = (i / devices.length) * 2 * Math.PI;
                const x = 50 + Math.cos(angle) * 25;
                const y = 50 + Math.sin(angle) * 25;
                const node = document.createElement('div');
                node.className = 'node';
                node.style.left = x + '%';
                node.style.top = y + '%';
                node.style.background = d.status ? '#16a34a' : '#dc2626';
                node.style.boxShadow = `0 0 10px ${d.status ? '#16a34a' : '#dc2626'}`;
                node.title = d.name;
                map.appendChild(node);
            });
        }

        setInterval(updateData, 1000);
        updateData();
    </script>
</body>
</html>
